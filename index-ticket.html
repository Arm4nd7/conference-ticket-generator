<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Document</title>
</head>

<body>
    <header>
        <div class="container">
            <label for="logo-inicio" class="logo-inicio">
                <img src="/conference-ticket-generator/assets/images/logo-full.svg" alt="logo-full">
            </label>
            <h1>
                Congrats, <p id="nombre">Nombre</p>! Your ticket is ready.
            </h1>
            <h2>
                We've emailed your ticket to <p>email</p>
                and will send updates in the run up to the event.
            </h2>
        </div>
    </header>

    <div class="container-ticket">
        <div class="container-info-ticket">
            <img src="/conference-ticket-generator/assets/images/pattern-ticket.svg" alt="ticket">
        </div>
        <div class="container-ticket-info-avatar">
            <div class="container-logo-date">
                <label for="logo-inicio" class="logo-inicio">
                    <img src="/conference-ticket-generator/assets/images/logo-full.svg" alt="logo-full">
                </label>
                <p class="user-date">Jan 31, 2025 / Austin, TX</p>
            </div>
            <div class="container-info-logo-avatar">
                <img class="user-logo" src="/conference-ticket-generator/assets/images/image-avatar.jpg" alt="">
                <h3 class="user-name">Nombre</h3>
                <p class="user-email">correo</p>
            </div>
        </div>
    </div>

</body>

</html>
